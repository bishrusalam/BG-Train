    <!DOCTYPE html>
<html>
<head>
  <title>Train Station Selector</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="station-section">
    <div class="station-block">
      <div class="station-title">Depart From</div>
      <div class="station-code">STN</div>
      <span class="station-label">Station Name</span>
      <select class="station-select">
        <option selected disabled>Select Station</option>
        <option value="dadar">Dadar</option>
        <option value="kurla">Kurla</option>
        <option value="cst">CST</option>
        <option value="thane">Thane</option>
      </select>
      <hr>
    </div>

    <div class="arrow">&#8594;</div>

    <div class="station-block">
      <div class="station-title">Going To</div>
      <div class="station-code">STN</div>
      <span class="station-label">Station Name</span>
      <select class="station-select">
        <option selected disabled>Select Station</option>
        <option value="vashi">Vashi</option>
        <option value="panvel">Panvel</option>
        <option value="kalyan">Kalyan</option>
        <option value="andheri">Andheri</option>
      </select>
      <hr>
    </div>
  </div>
