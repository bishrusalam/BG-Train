  <title>Sign Up</title>

<body class="signup-body">
    <div class="man">
      <div class="loo">
        <h1>Create Account</h1>
        <form>
            <label for="Username">Username</label>
            <input type="text" name="username" id="username" placeholder="Enter your username" required>
            <br><br>
            <label for="email">E-mail</label>
            <input type="email" name="email" id="email" placeholder="Enter your email" required>
            <br><br>
            <label for="password">Password</label>
            <input type="password" name="password" id="password" placeholder="Enter your password" required>
            <br><br>
            <label for="confirm">Confirm Password</label>
            <input type="password" name="confirm" id="confirm" placeholder="Confirm your password" required>
            <br><br>
            <a href="home.html" class="sbtn">Sign Up</a>
            <button class="sbtn" type="reset">New</button>
        </form>
        <p>Already have account?<a href="index.html"> Login</a></p>
      </div>
    </div>
</body>
</html>
